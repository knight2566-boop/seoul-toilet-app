version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: seoul-toilet-db
    environment:
      POSTGRES_DB: seoul_toilet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: seoul-toilet-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/seoul_toilet
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "80:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
